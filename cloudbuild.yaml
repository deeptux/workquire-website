# One pipeline: build backend/ → push to Artifact Registry → deploy Cloud Run
# Trigger: Configuration file = /cloudbuild.yaml (repo root)

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA
      - -f
      - Dockerfile
      - .
    dir: backend

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - workquire-website
      - --image=asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --allow-unauthenticated
      - --quiet

# Cloud Build pushes this image after the build step (no separate push step needed)
images:
  - asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
