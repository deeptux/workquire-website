# Cloud Build: build backend image → push to Artifact Registry → deploy Cloud Run
# Image: asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:COMMIT_SHA

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA
      - -f
      - backend/Dockerfile
      - backend

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - workquire-website
      - --image=asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --allow-unauthenticated
      - --quiet

images:
  - asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
