# Build → push → deploy (push MUST run before deploy; `images:` only pushes after all steps)

steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA
      - -f
      - Dockerfile
      - .
    dir: backend

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - workquire-website
      - --project=deeptuxpopic
      - --image=asia-southeast1-docker.pkg.dev/deeptuxpopic/workquire-website/workquire-website:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --allow-unauthenticated
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
